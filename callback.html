<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Callback | StyleNest</title>
  <meta name="description" content="Simulated payment callback result for your StyleNest order.">
  <style>
    :root {
      --bg: #f7f7f7;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #666666;
      --border: #e8e8e8;
      --primary: #111111;
      --success-bg: #eaf9ea;
      --success-text: #1c6b1c;
      --fail-bg: #fff2f2;
      --fail-text: #9a1f1f;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { width: min(860px, 92%); margin: 0 auto; }
    .page { padding: 44px 0; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }
    .status {
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0 14px;
      font-weight: 600;
    }
    .success { background: var(--success-bg); color: var(--success-text); }
    .failed { background: var(--fail-bg); color: var(--fail-text); }
    .meta { display: grid; gap: 8px; margin: 14px 0; }
    .meta-row { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px dashed var(--border); padding-bottom: 6px; }
    .items { list-style: none; margin: 12px 0; display: grid; gap: 8px; }
    .items li { border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; display: flex; justify-content: space-between; gap: 10px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      padding: 10px 16px;
      font-weight: 700;
      display: inline-block;
      background: #fff;
    }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <div class="panel">
        <h1>Payment Callback Route</h1>
        <p class="muted">This page simulates a payment callback endpoint result and final order completion.</p>
        <div id="status-box" class="status">Processing callback...</div>
        <div id="meta" class="meta"></div>
        <h3 style="margin-top:10px;">Order Items</h3>
        <ul id="items" class="items"></ul>
        <div class="actions">
          <a href="index.html" class="btn btn-primary">Continue Shopping</a>
          <a href="cart.html" class="btn">Back to Cart</a>
          <a href="checkout.html" class="btn">Back to Checkout</a>
        </div>
      </div>
    </div>
  </main>

  <script src="ecommerce.js"></script>
  <script>
    (function () {
      const store = window.StyleNestStore;
      const params = new URLSearchParams(window.location.search);
      const status = (params.get("status") || "failed").toLowerCase();
      const orderId = params.get("orderId") || "N/A";
      const paymentMethod = params.get("paymentMethod") || "unknown";
      const paymentRef = params.get("paymentRef") || "N/A";

      const statusBox = document.getElementById("status-box");
      const metaEl = document.getElementById("meta");
      const itemsEl = document.getElementById("items");

      const order = store.getLastOrder();
      const validOrder = order && order.orderId === orderId ? order : null;
      const finalOrder = validOrder || order;

      if (status === "success") {
        store.updateLastOrderStatus("paid", paymentRef);
        store.clearCart();
        statusBox.className = "status success";
        statusBox.textContent = "Payment successful. Callback received and order marked as paid.";
      } else {
        store.updateLastOrderStatus("failed", paymentRef);
        statusBox.className = "status failed";
        statusBox.textContent = "Payment failed callback received. Order remains unpaid.";
      }

      const amount = finalOrder ? store.formatMoney(finalOrder.amount || 0) : "$0.00";
      metaEl.innerHTML =
        "<div class=\"meta-row\"><span>Order ID</span><strong>" + orderId + "</strong></div>" +
        "<div class=\"meta-row\"><span>Payment Method</span><strong>" + paymentMethod.toUpperCase() + "</strong></div>" +
        "<div class=\"meta-row\"><span>Payment Reference</span><strong>" + paymentRef + "</strong></div>" +
        "<div class=\"meta-row\"><span>Amount</span><strong>" + amount + "</strong></div>" +
        "<div class=\"meta-row\"><span>Final Status</span><strong>" + (status === "success" ? "PAID" : "FAILED") + "</strong></div>";

      itemsEl.innerHTML = "";
      if (finalOrder && Array.isArray(finalOrder.items) && finalOrder.items.length) {
        finalOrder.items.forEach(function (item) {
          const li = document.createElement("li");
          li.innerHTML = "<span>" + item.name + " × " + item.qty + "</span><strong>" + store.formatMoney(item.qty * item.price) + "</strong>";
          itemsEl.appendChild(li);
        });
      } else {
        const li = document.createElement("li");
        li.textContent = "No order items available.";
        itemsEl.appendChild(li);
      }
    })();
  </script>
</body>
</html>
